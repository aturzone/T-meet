# cargo-deny configuration for T-meet
# Run: cargo deny check

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ─────────────────────────────────────────────────────────────────────────────
# Advisories
# ─────────────────────────────────────────────────────────────────────────────
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
# RUSTSEC-2025-0134 — `rustls-pemfile` marked unmaintained (functionality
# absorbed into `rustls-pki-types`). Migration tracked as a Phase 09 task.
# No known security defect; it's purely a maintenance signal.
ignore = ["RUSTSEC-2025-0134"]

# ─────────────────────────────────────────────────────────────────────────────
# Licenses — strict allowlist. AGPL-3.0 is fine for *our* code; we cannot
# accept GPL/AGPL *upstream* dependencies because they would force the whole
# binary under their license terms. AGPL-3.0 is intentionally absent here.
# ─────────────────────────────────────────────────────────────────────────────
[licenses]
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",            # file-level copyleft, compatible with our build
    "OpenSSL",            # rejected for *use* but some build-deps mention it
    "BSL-1.0",
]
# Our own crates ship as AGPL-3.0-or-later. They're whitelisted by name so
# AGPL-3.0 cannot accidentally enter through a transitive dependency.
exceptions = [
    { name = "meet-core",   allow = ["AGPL-3.0-or-later"] },
    { name = "meet-server", allow = ["AGPL-3.0-or-later"] },
    { name = "meet-sfu",    allow = ["AGPL-3.0-or-later"] },
]

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ─────────────────────────────────────────────────────────────────────────────
# Bans — packages we refuse to ship, and one-of-a-kind invariants.
# ─────────────────────────────────────────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards = "deny"
# Path/git dependencies inside the workspace appear as "*" — allowed.
# Crates.io wildcards still rejected.
allow-wildcard-paths = true
highlight = "all"

deny = [
    # rustls invariant — no OpenSSL anywhere in the tree.
    { crate = "openssl",      reason = "rustls only — keeps musl link clean" },
    { crate = "openssl-sys",  reason = "rustls only — keeps musl link clean" },
    { crate = "native-tls",   reason = "rustls only" },
    # Hash-DoS resistance — siphash defaults are fine but we ban these legacy crates.
    { crate = "fxhash",       reason = "use ahash instead" },
]

skip = []
skip-tree = []

# ─────────────────────────────────────────────────────────────────────────────
# Sources — only crates.io and the official rust-lang registry are allowed.
# ─────────────────────────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
