name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: x86_64
          - target: aarch64-unknown-linux-musl
            arch: aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install --locked cross

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Set SOURCE_DATE_EPOCH
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> $GITHUB_ENV

      - name: Build frontend
        run: |
          pnpm -C frontend install --frozen-lockfile
          pnpm -C frontend build

      - name: Build binary
        env:
          TARGET: ${{ matrix.target }}
        run: |
          if [ "$TARGET" = "aarch64-unknown-linux-musl" ]; then
            cross build --release --target "$TARGET"
          else
            cargo build --release --target "$TARGET"
          fi

      - name: Verify static linkage
        run: ./scripts/verify_static.sh "target/${{ matrix.target }}/release/meet-server"

      - name: Package tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            VERSION="$(grep -m1 '^version' crates/meet-server/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          fi
          PKG="meet-platform-${VERSION}-${{ matrix.arch }}-linux-musl"
          STAGE="dist/${PKG}"
          mkdir -p "$STAGE/docs"
          cp "target/${{ matrix.target }}/release/meet-server" "$STAGE/"
          cp config.example.toml "$STAGE/"
          cp run.sh "$STAGE/"
          cp LICENSE "$STAGE/"
          cp docs/INSTALL.md "$STAGE/docs/"
          cp docs/CA-TRUST.md "$STAGE/docs/"
          chmod +x "$STAGE/meet-server" "$STAGE/run.sh"
          tar --sort=name \
              --owner=0 --group=0 --numeric-owner \
              --mtime="@${SOURCE_DATE_EPOCH}" \
              -czf "dist/${PKG}.tar.gz" -C dist "${PKG}"
          (cd dist && sha256sum "${PKG}.tar.gz" > "${PKG}.tar.gz.sha256")

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: meet-platform-${{ matrix.arch }}
          path: dist/*.tar.gz*

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
